version: "3.8"

# =============================================================================
# Discord Broadcast System
#
# AUCUN fichier .env n'est nécessaire.
# Toutes les variables sont définies dans Portainer > Stacks > Environment.
#
# Déploiement Portainer :
#   1. Stacks → Add stack → Repository → URL de ce repo
#   2. Ajouter toutes les variables ci-dessous dans "Environment variables"
#   3. Deploy the stack
#   4. Enregistrer les commandes slash une seule fois :
#        Containers → discord-broadcast → Console → node scripts/register-commands.js
# =============================================================================

services:
  broadcast:
    build:
      context: .
      dockerfile: Dockerfile
    image: discord-broadcast:latest
    container_name: discord-broadcast
    restart: unless-stopped

    # Limites ressources (VM 2vCPU / 2GB RAM)
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

    # Réseau host = latence UDP optimale pour Discord voice
    network_mode: host

    environment:
      # ── OBLIGATOIRES ────────────────────────────────────────────────────────

      # Token du bot maître (rejoint le canal source + gère les commandes)
      - MASTER_BOT_TOKEN=${MASTER_BOT_TOKEN}

      # ID de votre serveur Discord
      - GUILD_ID=${GUILD_ID}

      # ID du canal vocal source (ex: "Shotcallers")
      - SOURCE_CHANNEL_ID=${SOURCE_CHANNEL_ID}

      # ID du rôle autorisé à parler (broadcasté) et à utiliser /start /stop /status
      - SHOTCALLER_ROLE_ID=${SHOTCALLER_ROLE_ID}

      # ID du rôle autorisé à utiliser /start /stop /status (optionnel)
      - STAFF_ROLE_ID=${STAFF_ROLE_ID:-}

      # ID du salon texte pour les alertes de déconnexion (optionnel)
      - ALERT_CHANNEL_ID=${ALERT_CHANNEL_ID:-}

      # ── BOTS RELAIS ─────────────────────────────────────────────────────────
      # Ajoutez autant de bots que de canaux cibles (max 20)
      # Chaque bot nécessite son propre token Discord

      - RELAY_BOT_TOKEN_1=${RELAY_BOT_TOKEN_1}
      - TARGET_CHANNEL_ID_1=${TARGET_CHANNEL_ID_1}
      - RELAY_BOT_NAME_1=${RELAY_BOT_NAME_1:-Team 1}

      - RELAY_BOT_TOKEN_2=${RELAY_BOT_TOKEN_2:-}
      - TARGET_CHANNEL_ID_2=${TARGET_CHANNEL_ID_2:-}
      - RELAY_BOT_NAME_2=${RELAY_BOT_NAME_2:-Team 2}

      - RELAY_BOT_TOKEN_3=${RELAY_BOT_TOKEN_3:-}
      - TARGET_CHANNEL_ID_3=${TARGET_CHANNEL_ID_3:-}
      - RELAY_BOT_NAME_3=${RELAY_BOT_NAME_3:-Team 3}

      - RELAY_BOT_TOKEN_4=${RELAY_BOT_TOKEN_4:-}
      - TARGET_CHANNEL_ID_4=${TARGET_CHANNEL_ID_4:-}
      - RELAY_BOT_NAME_4=${RELAY_BOT_NAME_4:-Team 4}

      - RELAY_BOT_TOKEN_5=${RELAY_BOT_TOKEN_5:-}
      - TARGET_CHANNEL_ID_5=${TARGET_CHANNEL_ID_5:-}
      - RELAY_BOT_NAME_5=${RELAY_BOT_NAME_5:-Team 5}

      - RELAY_BOT_TOKEN_6=${RELAY_BOT_TOKEN_6:-}
      - TARGET_CHANNEL_ID_6=${TARGET_CHANNEL_ID_6:-}
      - RELAY_BOT_NAME_6=${RELAY_BOT_NAME_6:-Team 6}

      - RELAY_BOT_TOKEN_7=${RELAY_BOT_TOKEN_7:-}
      - TARGET_CHANNEL_ID_7=${TARGET_CHANNEL_ID_7:-}
      - RELAY_BOT_NAME_7=${RELAY_BOT_NAME_7:-Team 7}

      - RELAY_BOT_TOKEN_8=${RELAY_BOT_TOKEN_8:-}
      - TARGET_CHANNEL_ID_8=${TARGET_CHANNEL_ID_8:-}
      - RELAY_BOT_NAME_8=${RELAY_BOT_NAME_8:-Team 8}

      - RELAY_BOT_TOKEN_8=${RELAY_BOT_TOKEN_9:-}
      - TARGET_CHANNEL_ID_8=${TARGET_CHANNEL_ID_9:-}
      - RELAY_BOT_NAME_8=${RELAY_BOT_NAME_8:-Team 9}

      - RELAY_BOT_TOKEN_8=${RELAY_BOT_TOKEN_10:-}
      - TARGET_CHANNEL_ID_8=${TARGET_CHANNEL_ID_10:-}
      - RELAY_BOT_NAME_8=${RELAY_BOT_NAME_8:-Team 10}

      - RELAY_BOT_TOKEN_8=${RELAY_BOT_TOKEN_11:-}
      - TARGET_CHANNEL_ID_8=${TARGET_CHANNEL_ID_11:-}
      - RELAY_BOT_NAME_8=${RELAY_BOT_NAME_8:-Team 11}

      - RELAY_BOT_TOKEN_8=${RELAY_BOT_TOKEN_12:-}
      - TARGET_CHANNEL_ID_8=${TARGET_CHANNEL_ID_12:-}
      - RELAY_BOT_NAME_8=${RELAY_BOT_NAME_8:-Team 12}
      
      # Pour 9 à 20 bots, décommentez et complétez :
      # - RELAY_BOT_TOKEN_9=${RELAY_BOT_TOKEN_9:-}
      # - TARGET_CHANNEL_ID_9=${TARGET_CHANNEL_ID_9:-}
      # - RELAY_BOT_NAME_9=${RELAY_BOT_NAME_9:-Team 9}

      # ── AUDIO (optionnel, valeurs par défaut recommandées) ─────────────────

      # Durée d'une frame audio en ms (ne pas changer)
      - FRAME_DURATION_MS=${FRAME_DURATION_MS:-20}

      # Taille d'une frame PCM en octets (20ms @ 48kHz stéréo s16le = 3840)
      - PCM_FRAME_SIZE=${PCM_FRAME_SIZE:-3840}

      # Jitter buffer : frames en avance côté relay (2 = 40ms de buffer)
      # Augmenter à 3-4 si l'audio est saccadé sur réseau instable
      - JITTER_BUFFER_FRAMES=${JITTER_BUFFER_FRAMES:-2}

      # Taille max de la queue audio avant drop (anti memory-leak)
      - MAX_BUFFER_FRAMES=${MAX_BUFFER_FRAMES:-25}

      # Délai silence avant d'arrêter de tracker un speaker (ms)
      - SILENCE_THRESHOLD_MS=${SILENCE_THRESHOLD_MS:-150}

      # ── LOGS ────────────────────────────────────────────────────────────────
      # Niveaux : error | warn | info | debug
      - LOG_LEVEL=${LOG_LEVEL:-info}

    volumes:
      - broadcast_data:/data

    dns:
      - 1.1.1.1
      - 8.8.8.8

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  broadcast_data:
    driver: local
